<!DOCTYPE html>
<html>
<head>
    <title>Shop SMS Inbox</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f9fbfc; }
        .message { background: #fff; box-shadow: 0 2px 8px #e0e0e0; padding: 18px; margin: 18px 0; border-radius: 12px; transition: box-shadow 0.2s; }
        .message:hover { box-shadow: 0 4px 16px #b2dfdb; }
        .sender { color: #128C7E; font-weight: bold; font-size: 1.1em; }
        .time { color: #999999d6; font-size: 12px; float: right; }
        h1 { color: #128C7E; font-size: 2.5em; display: flex; align-items: center; gap: 10px; }
        .sms-form { background: #e0f7fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 1px 4px #b2ebf2; }
        .sms-form label { display: block; margin-bottom: 6px; color: #000879; font-weight: 500; }
        .sms-form input, .sms-form textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #b2dfdb; border-radius: 6px; font-size: 1em; }
        .sms-form button { background: #128C7E; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 1em; cursor: pointer; transition: background 0.2s; }
        .sms-form button:hover { background: #0d6b5c; }
        .clearfix::after { content: ""; display: table; clear: both; }
    </style>
</head>
<body>
    <h1> <span>📱</span> Shop SMS Inbox</h1>
    <form class="sms-form" id="smsForm">
        <label for="sender">Sender</label>
        <input type="text" id="sender" name="sender" maxlength="20" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" maxlength="500" required></textarea>
        <button type="submit">Send SMS</button>
    </form>
    <p>Total messages: {{ messages.count }}</p>
    {% for msg in messages %}
    <div class="message clearfix">
        <span class="time">{{ msg.received_at }}</span>
        <p class="sender">From: {{ msg.sender }}</p>
        <p>{{ msg.message }}</p>
    </div>
    {% empty %}
    <p>No messages yet</p>
    {% endfor %}
    <script>
    document.getElementById('smsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const sender = document.getElementById('sender').value;
        const message = document.getElementById('message').value;
        const response = await fetch('/sms/receive/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from: sender, message: message })
        });
        if (response.ok) {
            window.location.reload();
        } else {
            alert('Failed to send SMS');
        }
    });
    </script>
</body>
</html>
