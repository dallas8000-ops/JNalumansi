<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart Review</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Mystyle.css">
</head>
<body>
    <!-- Loading Indicator -->
    <div id="loading" style="display:none;text-align:center;padding:2em;font-size:1.2em;">
        <span>Loading cart...</span>
    </div>
    <!-- Feedback Message -->
    <div id="feedback" style="display:none;text-align:center;padding:1em 2em;font-size:1.1em;border-radius:6px;margin:1em auto;max-width:400px;"></div>
    <header>
        <div class="container">
            <h1 style="text-align:center;">Your Cart</h1>
            <nav style="display:flex;gap:1.2rem;justify-content:center;margin-bottom:0.5rem;">
                <a href="index.html" class="nav-link">Home</a>
                <a href="catalog.html" class="nav-link">Catalog</a>
                <a href="cart.html" class="nav-link active">Cart</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            <h2>Review Your Cart</h2>
            <table style="width:100%;margin-top:2rem;border-collapse:collapse;">
                <thead>
                    <tr style="background:#0B294D;color:#fff;">
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Edit</th>
                    </tr>
                </thead>
                <tbody id="cartItems">
                    <!-- Cart items will be rendered here by JS -->
                </tbody>
            </table>
            <div style="text-align:right;margin-top:1rem;">
                <button id="clearCartBtn" style="background:#d9534f;color:#fff;padding:0.5rem 1.2rem;border:none;border-radius:4px;cursor:pointer;">Delete</button>
                <a href="inventory.html#checkout" id="checkoutBtn" style="background:#28a745;color:#fff;padding:0.5rem 1.2rem;border:none;border-radius:4px;cursor:pointer;text-decoration:none;margin-left:1rem;display:inline-block;font-weight:bold;">Proceed to Checkout</a>
            </div>
            <div id="cartEmpty" style="text-align:center;margin:2rem 0;color:#888;display:none;">Your cart is empty.</div>
        </div>
    </main>
    <footer>
        <div class="container">
            <div class="footer-content" style="text-align:center;padding:2rem 0 1rem 0;">
                <p style="margin-bottom:0.5rem;">&copy; 2024 Kistie Store. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script src="productImageUrl.js"></script>
    <script src="cart.js"></script>

</body>
</html>
