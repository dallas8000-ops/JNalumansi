<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kistie Store - Inventory</title>
  <link rel="stylesheet" href="Mystyle.css">
  <style>
    .inventory-container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
    .inventory-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .inventory-header h2 { color: var(--nalumansi-primary-accent); }
    .product-console, .cart-console, .coupon-console { background: var(--nalumansi-card-bg); border-radius: 1rem; box-shadow: 0 2px 8px rgba(44,62,80,0.08); padding: 1.5rem; margin-bottom: 2rem; }
    .product-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .product-table th, .product-table td { padding: 0.7rem; border-bottom: 1px solid var(--nalumansi-border-accent); text-align: left; }
    .product-table th { background: var(--nalumansi-header-bg); color: var(--nalumansi-toggle-text); }
    .product-table td button { background: var(--nalumansi-primary-accent); color: #fff; border: none; border-radius: 0.5rem; padding: 0.3rem 1rem; cursor: pointer; transition: background 0.2s; }
    .product-table td button:hover { background: #217dbb; }
    .add-product-form { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .add-product-form input { padding: 0.5rem; border: 1px solid var(--nalumansi-border-accent); border-radius: 0.5rem; }
    .add-product-form button { background: var(--nalumansi-primary-accent); color: #fff; border: none; border-radius: 0.5rem; padding: 0.5rem 1.5rem; cursor: pointer; }
    .add-product-form button:hover { background: #217dbb; }
    .cart-console, .coupon-console { margin-top: 2rem; }
    @media (max-width: 800px) {
      .inventory-header { flex-direction: column; align-items: flex-start; }
      .add-product-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header style="position:sticky;top:0;z-index:1000;background:var(--nalumansi-primary-accent);box-shadow:0 2px 8px rgba(44,62,80,0.08);padding:0.5rem 0;">
    <div class="header-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <h1 style="font-size:2.2rem;font-weight:700;margin-bottom:0.7rem;letter-spacing:0.08em;color:#fff;">Kistie Store</h1>
      <nav style="display:flex;gap:1.2rem;justify-content:center;margin-bottom:0.5rem;">
        <a href="index.html" class="nav-link" style="color:#fff;">Home</a>
        <a href="about.html" class="nav-link" style="color:#fff;">About</a>
        <a href="catalog-pro.html" class="nav-link" style="color:#fff;">Catalog</a>
        <a href="inventory.html" class="nav-link active" style="color:#fff;background:#fff1;border-radius:0.5rem;">Inventory</a>
        <button class="toggle-dark" id="themeToggle" title="Toggle dark mode" style="background:#fff1;color:#fff;border:none;border-radius:0.5rem;padding:0.3rem 0.7rem;">🌓</button>
      </nav>
    </div>
  </header>
  <main>
    <div class="inventory-container">
      <div class="inventory-header">
        <h2>Inventory Management</h2>
        <span>Manage your products, cart, and coupons</span>
      </div>
      <!-- Admin Login Section -->
      <div id="adminLoginBox" style="margin-bottom:1.5rem;">
        <form id="adminLoginForm" style="display:flex;gap:1rem;align-items:center;">
          <input type="text" id="adminUsername" placeholder="Admin Username" required>
          <input type="password" id="adminPassword" placeholder="Admin Password" required>
          <button type="submit">Admin Login</button>
          <button type="button" id="adminLogoutBtn" style="display:none;">Logout</button>
        </form>
        <div id="adminLoginMsg" style="color:#c00;margin-top:0.5rem;"></div>
      </div>
      <!-- Checkout Section -->
      <section id="checkout" class="catalog-container" style="margin-bottom:2rem;background:#f8f9fa;border-radius:1rem;box-shadow:0 2px 8px rgba(44,62,80,0.08);padding:2rem 1.5rem;">
        <h2 style="color:#007bff;margin-bottom:0.5em;">Checkout: Shipping & Payment</h2>
        <p style="font-size:1.1em;">Fill in your shipping destination and order details to complete your purchase.</p>
        <!-- Place your shipping and payment forms here -->
        <!-- Example: -->
        <form id="shippingForm">
          <label for="shipDestination">Destination:</label>
          <select id="shipDestination" required>
            <option value="UK">UK</option>
            <option value="USA">USA</option>
            <option value="Rwanda">Rwanda</option>
            <option value="Kenya">Kenya</option>
          </select>
          <input type="number" id="shipWeight" placeholder="Weight (kg)" min="0.1" step="0.1" required />
          <button type="submit">Get Quote</button>
          <button type="button" id="clearShipping" style="margin-left:10px;">Clear</button>
        </form>
        <div id="shippingFormMsg"></div>
        <form id="orderForm" style="margin-top:1.5rem;">
          <input type="text" id="orderName" placeholder="Your Name" required />
          <input type="email" id="orderEmail" placeholder="Your Email" required />
          <input type="text" id="orderPhone" placeholder="Phone Number" required />
          <select id="orderCurrency" required>
            <option value="UGX">UGX</option>
            <option value="KES">KES</option>
            <option value="EUR">EUR</option>
          </select>
          <button type="submit">Submit Order</button>
          <button type="button" id="clearOrder" style="margin-left:10px;">Clear</button>
        </form>
        <div id="orderFormMsg"></div>
      </section>
      <!-- The rest of your inventory/admin/product management sections go here -->
      <!-- ... -->
    </div>
  </main>
  <script src="inventory.js"></script>
  <!-- Add your admin login/order/shipping JS logic here as needed -->
</body>
</html>
