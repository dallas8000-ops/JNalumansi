  <script>
  // --- Shipping Quote Form Logic ---
  document.getElementById('shippingForm').onsubmit = async function(e) {
    e.preventDefault();
    const msg = document.getElementById('shippingFormMsg');
    msg.textContent = '';
    const destination = document.getElementById('shipDestination').value;
    const weightKg = parseFloat(document.getElementById('shipWeight').value);
    try {
      const res = await fetch('http://localhost:3001/api/shipping-quote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ destination, weightKg }),
        credentials: 'include'
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Shipping quote failed');
      msg.textContent = `Shipping to ${data.destination}: $${data.shippingCost} (for ${data.weightKg} kg)`;
    } catch (err) {
      msg.textContent = 'Shipping quote failed: ' + err.message;
    }
  };
  document.getElementById('clearShipping').onclick = function() {
    document.getElementById('shippingForm').reset();
    document.getElementById('shippingFormMsg').textContent = '';
  };
  // --- Order Form Logic ---
  document.getElementById('orderForm').onsubmit = async function(e) {
    e.preventDefault();
    const msg = document.getElementById('orderFormMsg');
    msg.textContent = '';
    const name = document.getElementById('orderName').value;
    const email = document.getElementById('orderEmail').value;
    const phone = document.getElementById('orderPhone').value;
    const currency = document.getElementById('orderCurrency').value;
    // For demo, use a static session id (in production, use real session/auth)
    const session = 'guest';
    try {
      const res = await fetch('http://localhost:3001/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-session-id': session },
        body: JSON.stringify({ name, email, phone, currency }),
        credentials: 'include'
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Order failed');
      msg.textContent = `Order placed! Order ID: ${data.order_id}, Total: ${data.total}`;
      document.getElementById('orderForm').reset();
    } catch (err) {
      msg.textContent = 'Order failed: ' + err.message;
    }
  };
  document.getElementById('clearOrder').onclick = function() {
    document.getElementById('orderForm').reset();
    document.getElementById('orderFormMsg').textContent = '';
  };

        <script>
        // --- Admin Login Logic ---
        window.isAdmin = false;
        const adminLoginBox = document.getElementById('adminLoginBox');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminLogoutBtn = document.getElementById('adminLogoutBtn');
        const adminLoginMsg = document.getElementById('adminLoginMsg');
        const adminProductConsole = document.getElementById('adminProductConsole');

        function setAdminUI(loggedIn) {
          window.isAdmin = loggedIn;
          if (loggedIn) {
            localStorage.setItem('kistieAdmin', 'true');
            adminProductConsole.style.display = '';
            adminLogoutBtn.style.display = '';
            adminLoginForm.querySelector('button[type="submit"]').style.display = 'none';
            adminLoginForm.querySelector('#adminUsername').style.display = 'none';
            adminLoginForm.querySelector('#adminPassword').style.display = 'none';
            adminLoginMsg.textContent = '';
            // Always render catalog list when admin logs in
            if (typeof renderProducts === 'function') renderProducts();
            // Also show the product table container
            var productTableContainer = document.getElementById('productTableContainer');
            if (productTableContainer) productTableContainer.style.display = '';
          } else {
            localStorage.removeItem('kistieAdmin');
            adminProductConsole.style.display = 'none';
            adminLogoutBtn.style.display = 'none';
            adminLoginForm.querySelector('button[type="submit"]').style.display = '';
            adminLoginForm.querySelector('#adminUsername').style.display = '';
            adminLoginForm.querySelector('#adminPassword').style.display = '';
            adminLoginMsg.textContent = '';
          }
        }

        adminLoginForm.onsubmit = async function(e) {
          e.preventDefault();
          const username = document.getElementById('adminUsername').value;
          const password = document.getElementById('adminPassword').value;
          try {
            const res = await fetch('http://localhost:3001/api/login', {
              method: 'POST',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Login failed');
            setAdminUI(true);
          } catch (err) {
            adminLoginMsg.textContent = 'Login failed: ' + err.message;
          }
        };
        adminLogoutBtn.onclick = async function() {
          try {
            await fetch('http://localhost:3001/api/logout', { method: 'POST', credentials: 'include' });
          } catch (e) {}
          localStorage.removeItem('kistieAdmin');
          setAdminUI(false);
          // No reload needed; UI resets
        };
        // On page load, check backend session for admin status
        async function checkAdminSession() {
          try {
            const res = await fetch('http://localhost:3001/api/products', { credentials: 'include' });
            // If products endpoint works, check if admin UI should be shown (localStorage fallback for now)
            if (localStorage.getItem('kistieAdmin') === 'true') {
              setAdminUI(true);
              // Ensure catalog list is rendered and visible
              if (typeof renderProducts === 'function') renderProducts();
              var productTableContainer = document.getElementById('productTableContainer');
              if (productTableContainer) productTableContainer.style.display = '';
            } else {
              setAdminUI(false);
            }
          } catch (e) {
            setAdminUI(false);
          }
        }
        checkAdminSession();
        </script>
